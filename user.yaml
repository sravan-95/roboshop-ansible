- name: configuring user
  hosts: user
  become: yes
  tasks: 
  - name: enable nodejs 20
    command: dnf module enable nodejs:20 -y
  - name: install nodejs 20
    package: 
       name: nodejs
       state: present
  - name: create system user
    user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"
  - name: remove /app directory
    file:
      path: /app
      state: absent
  - name: delete user.zip in tmp directory
    file: 
      path: /tmp/user.zip
      state: absent
  - name: create /app directory
    file:
      path: /app
      state: directory
  - name: download user application code
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
      dest: /tmp/user.zip
  - name: unzip user application code
    unarchive: 
      src: /tmp/user.zip
      dest: /app
      remote_src: yes
  - name: install nodejs dependencies
    community.general.npm:
      path: /app
  - name: copy user service
    template:
      src: user.service.j2
      dest: /etc/systemd/system/user.service
  - name: daemon reload
    systemd_service:
      name: user
      daemon_reload: true
  - name: start and enable user
    service:
      name: user
      state: started
      enabled: yes
      