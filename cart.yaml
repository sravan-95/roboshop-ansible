- name: configuring cart
  hosts: cart
  become: yes
  tasks: 
  - name: enable nodejs 20
    command: dnf module enable nodejs:20 -y
  - name: install nodejs 20
    package: 
       name: nodejs
       state: present
  - name: create system user
    user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"
  - name: remove /app directory
    file:
      path: /app
      state: absent
  - name: delete cart.zip in tmp directory
    file: 
      path: /tmp/cart.zip
      state: absent
  - name: create /app directory
    file:
      path: /app
      state: directory
  - name: download cart application code
    ansible.builtin.get_url:
      src: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip 
      dest: /tmp/cart.zip
  - name: unzip cart application code
    unarchive: 
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes
  - name: install nodejs dependencies
    community.general.npm:
      path: /app
  - name: copy cart service
    template:
      src: cart.service.j2
      dest: /etc/systemd/system/cart.service
  - name: daemon reload
    systemd_service:
      name: cart
      daemon_reload: true
  - name: start and enable cart
    service:
      name: cart
      state: started
      enabled: yes
      