- name: configure shipping 
  hosts: shipping
  become: yes
  tasks:
   - name: install maven 
     package:
        name: "{{item}}"
        state: present
     loop:
     - maven
     - mysql
   - name: create roboshop system user
     user: 
        name: roboshop
        system: true
        home: /app
        shell: /sbin/nologin
        comment: "roboshop system user"
   - name: remove app directory
     file:
        path: /app
        state: absent
   - name: delete shipping.zip in tmp directory
     file: 
        path: /tmp/shipping.zip
        state: absent 
   - name: create app directory
     file:
        path: /app
        state: directory
   - name: download shipping 
     get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
        dest: /tmp/shipping.zip
   - name: unzip shipping
     unarchive: 
        src: /tmp/shipping.zip
        dest: /app
        remote_src: yes
   - name: install dependencies
     command: mvn clean package
     args: 
        chdir: /app
   - name: move shipping.jar files
     command: mv target/shipping-1.0.jar shipping.jar
     args: 
        chdir: /app
   - name: copy shipping service
     template:
        src: shipping.service.j2
        dest: /etc/systemd/system/shipping.service
   - name: install python dependencies
     pip:
        name: PyMySQL
        executable: pip3.9
   - name: load mysql data
     ansible.mysql.mysql_db:
        state: import
        name: all
        login_user: root
        login_password: RoboShop@1
        login_host: "{{MYSQL_HOST}}"
        target: "{{item}}"
     loop:
      - /app/db/schema.sql
      - /app/db/app-user.sql
      - /app/db/master-data.sql
   - name: daemon reload
     systemd_service:
        name: shipping
        state: restarted
        daemon_reload: true
   - name: enable and start shipping
     service:
        name: shipping
        state: restarted
        enabled: true

        
